services:

  mysql:
    image: mysql:8.4
    container_name: appliance-mysql
    hostname: mysql
    restart: unless-stopped

    ports:
      - "3308:3306"

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      APPLIANCE_DB_USERNAME: ${APPLIANCE_DB_USERNAME}
      APPLIANCE_DB_PASSWORD: ${APPLIANCE_DB_PASSWORD}
      DEBEZIUM_DB_USER: ${DEBEZIUM_DB_USER}
      DEBEZIUM_DB_PASSWORD: ${DEBEZIUM_DB_PASSWORD}

    command:
      - --server-id=223344
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
      - --binlog-expire-logs-seconds=864000

    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    networks:
      - appliance-network


  phpmyadmin:
    image: phpmyadmin:5.2.3
    container_name: appliance-phpmyadmin
    restart: unless-stopped

    ports:
      - "8085:80"

    environment:
      PMA_HOST: mysql
      PMA_PORT: "3306"

    depends_on:
      mysql:
        condition: service_healthy

    networks:
      - appliance-network


  kafka:
    image: apache/kafka:4.1.2
    container_name: appliance-kafka
    hostname: kafka
    restart: unless-stopped

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
        CONTROLLER:PLAINTEXT,
        PLAINTEXT:PLAINTEXT,
        PLAINTEXT_HOST:PLAINTEXT

      KAFKA_LISTENERS: >
        CONTROLLER://:29093,
        PLAINTEXT_HOST://:9092,
        PLAINTEXT://:19092

      KAFKA_ADVERTISED_LISTENERS: >
        PLAINTEXT_HOST://localhost:9092,
        PLAINTEXT://kafka:19092

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: >
        1@kafka:29093

      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1

      KAFKA_LOG_DIRS: /var/lib/kafka/data

    volumes:
      - kafka-data:/var/lib/kafka/data

    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

    networks:
      - appliance-network


  kafka-connect:
    image: quay.io/debezium/connect:3.5.2.Final
    container_name: appliance-kafka-connect
    hostname: kafka-connect
    restart: unless-stopped

    ports:
      - "8086:8083"

    environment:
      BOOTSTRAP_SERVERS: kafka:19092
      GROUP_ID: appliance-connect-cluster

      CONFIG_STORAGE_TOPIC: appliance_connect_configs
      OFFSET_STORAGE_TOPIC: appliance_connect_offsets
      STATUS_STORAGE_TOPIC: appliance_connect_statuses

      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"

      CONNECT_OFFSET_STORAGE_PARTITIONS: "1"
      CONNECT_STATUS_STORAGE_PARTITIONS: "1"

      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter

      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"

      REST_HOST_NAME: "0.0.0.0"
      ADVERTISED_HOST_NAME: kafka-connect

      CONNECT_CONFIG_PROVIDERS: env
      CONNECT_CONFIG_PROVIDERS_ENV_CLASS: org.apache.kafka.common.config.provider.EnvVarConfigProvider
      CONNECT_CONFIG_PROVIDERS_ENV_PARAM_ALLOWLIST_PATTERN: "^DEBEZIUM_DB_.*"

      DEBEZIUM_DB_USER: ${DEBEZIUM_DB_USER}
      DEBEZIUM_DB_PASSWORD: ${DEBEZIUM_DB_PASSWORD}

      HEAP_OPTS: "-Xms256M -Xmx512M"
      LOG_LEVEL: INFO

    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy

    networks:
      - appliance-network


  mailpit:
    image: axllent/mailpit:v1.30.3
    container_name: appliance-mailpit
    hostname: mailpit
    restart: unless-stopped

    ports:
      - "8025:8025"
      - "1025:1025"

    environment:
      MP_MAX_MESSAGES: "5000"
      MP_DATABASE: /data/mailpit.db

    volumes:
      - mailpit-data:/data

    networks:
      - appliance-network


  config-server:
    build:
      context: ../config-server
      dockerfile: Dockerfile

    container_name: appliance-config-server
    restart: unless-stopped

    ports:
      - "8888:8888"

    environment:
      SPRING_PROFILES_ACTIVE: docker
      CONFIG_REPO_URI: ${CONFIG_REPO_URI}
      CONFIG_REPO_BRANCH: ${CONFIG_REPO_BRANCH}

    networks:
      - appliance-network


  eureka-server:
    build:
      context: ../eureka-server
      dockerfile: Dockerfile

    container_name: appliance-eureka-server
    restart: unless-stopped

    ports:
      - "8761:8761"

    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888

    depends_on:
      - config-server

    networks:
      - appliance-network


  product-service:
    build:
      context: ../product-service
      dockerfile: Dockerfile

    container_name: appliance-product-service
    restart: unless-stopped

    ports:
      - "8081:8081"

    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      APPLIANCE_DB_USERNAME: ${APPLIANCE_DB_USERNAME}
      APPLIANCE_DB_PASSWORD: ${APPLIANCE_DB_PASSWORD}

    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_started
      eureka-server:
        condition: service_started

    networks:
      - appliance-network


  cart-service:
    build:
      context: ../cart-service
      dockerfile: Dockerfile

    container_name: appliance-cart-service
    restart: unless-stopped

    ports:
      - "8082:8082"

    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      APPLIANCE_DB_USERNAME: ${APPLIANCE_DB_USERNAME}
      APPLIANCE_DB_PASSWORD: ${APPLIANCE_DB_PASSWORD}

    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_started
      eureka-server:
        condition: service_started
      product-service:
        condition: service_started

    networks:
      - appliance-network


  sales-service:
    build:
      context: ../sales-service
      dockerfile: Dockerfile

    container_name: appliance-sales-service
    restart: unless-stopped

    ports:
      - "8083:8083"

    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      APPLIANCE_DB_USERNAME: ${APPLIANCE_DB_USERNAME}
      APPLIANCE_DB_PASSWORD: ${APPLIANCE_DB_PASSWORD}

    depends_on:
      mysql:
        condition: service_healthy
      config-server:
        condition: service_started
      eureka-server:
        condition: service_started
      cart-service:
        condition: service_started

    networks:
      - appliance-network


  notification-service:
    build:
      context: ../notification-service
      dockerfile: Dockerfile

    container_name: appliance-notification-service
    restart: unless-stopped

    ports:
      - "8084:8084"

    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      APPLIANCE_DB_USERNAME: ${APPLIANCE_DB_USERNAME}
      APPLIANCE_DB_PASSWORD: ${APPLIANCE_DB_PASSWORD}

    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mailpit:
        condition: service_started
      config-server:
        condition: service_started
      eureka-server:
        condition: service_started

    networks:
      - appliance-network


  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile

    container_name: appliance-api-gateway
    restart: unless-stopped

    ports:
      - "8088:8088"

    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888

    depends_on:
      config-server:
        condition: service_started
      eureka-server:
        condition: service_started
      product-service:
        condition: service_started
      cart-service:
        condition: service_started
      sales-service:
        condition: service_started
      notification-service:
        condition: service_started

    networks:
      - appliance-network


volumes:
  mysql-data:
  kafka-data:
  mailpit-data:


networks:
  appliance-network:
    name: appliance-network