services:

  # =========================================================
  # MYSQL 8.4
  # =========================================================
  mysql:
    image: mysql:8.4
    container_name: appliance-mysql
    hostname: mysql
    restart: unless-stopped

    ports:
      - "3308:3306"

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

    command:
      - --server-id=223344
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --binlog-row-image=FULL
      - --binlog-expire-logs-seconds=864000

    volumes:
      - mysql-data:/var/lib/mysql

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    networks:
      - appliance-network


  # =========================================================
  # PHPMYADMIN
  # =========================================================
  phpmyadmin:
    image: phpmyadmin:5.2.3
    container_name: appliance-phpmyadmin
    restart: unless-stopped

    ports:
      - "8085:80"

    environment:
      PMA_HOST: mysql
      PMA_PORT: "3306"

    depends_on:
      mysql:
        condition: service_healthy

    networks:
      - appliance-network


  # =========================================================
  # APACHE KAFKA - KRAFT
  # =========================================================
  kafka:
    image: apache/kafka:4.1.2
    container_name: appliance-kafka
    hostname: kafka
    restart: unless-stopped

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: "broker,controller"

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
        CONTROLLER:PLAINTEXT,
        PLAINTEXT:PLAINTEXT,
        PLAINTEXT_HOST:PLAINTEXT

      # Acceso interno y externo:
      # - localhost:9092 desde IntelliJ/Windows
      # - kafka:19092 desde otros contenedores
      KAFKA_LISTENERS: >
        CONTROLLER://:29093,
        PLAINTEXT_HOST://:9092,
        PLAINTEXT://:19092

      KAFKA_ADVERTISED_LISTENERS: >
        PLAINTEXT_HOST://localhost:9092,
        PLAINTEXT://kafka:19092

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_CONTROLLER_QUORUM_VOTERS: >
        1@kafka:29093

      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"

      # Configuración local con un solo broker
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1

      KAFKA_LOG_DIRS: /var/lib/kafka/data

    volumes:
      - kafka-data:/var/lib/kafka/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

    networks:
      - appliance-network


  # =========================================================
  # KAFKA CONNECT + DEBEZIUM
  # =========================================================
  kafka-connect:
    image: quay.io/debezium/connect:3.5.2.Final
    container_name: appliance-kafka-connect
    hostname: kafka-connect
    restart: unless-stopped

    ports:
      # API REST de Kafka Connect
      - "8086:8083"

    environment:
      BOOTSTRAP_SERVERS: kafka:19092

      GROUP_ID: appliance-connect-cluster

      CONFIG_STORAGE_TOPIC: appliance_connect_configs
      OFFSET_STORAGE_TOPIC: appliance_connect_offsets
      STATUS_STORAGE_TOPIC: appliance_connect_statuses

      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: "1"
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: "1"

      CONNECT_OFFSET_STORAGE_PARTITIONS: "1"
      CONNECT_STATUS_STORAGE_PARTITIONS: "1"

      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter

      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"

      REST_HOST_NAME: "0.0.0.0"
      ADVERTISED_HOST_NAME: kafka-connect

      # Permite usar variables del entorno en el JSON del connector
      CONNECT_CONFIG_PROVIDERS: env
      CONNECT_CONFIG_PROVIDERS_ENV_CLASS: org.apache.kafka.common.config.provider.EnvVarConfigProvider
      CONNECT_CONFIG_PROVIDERS_ENV_PARAM_ALLOWLIST_PATTERN: "^DEBEZIUM_DB_.*"

      DEBEZIUM_DB_USER: ${DEBEZIUM_DB_USER}
      DEBEZIUM_DB_PASSWORD: ${DEBEZIUM_DB_PASSWORD}

      HEAP_OPTS: "-Xms256M -Xmx512M"
      LOG_LEVEL: INFO

    depends_on:
      mysql:
        condition: service_healthy

      kafka:
        condition: service_healthy

    networks:
      - appliance-network


  # =========================================================
  # MAILPIT - SERVIDOR SMTP LOCAL
  # =========================================================
  mailpit:
    image: axllent/mailpit:v1.30.3
    container_name: appliance-mailpit
    hostname: mailpit
    restart: unless-stopped

    ports:
      # Interfaz web para visualizar los correos
      - "8025:8025"

      # Puerto SMTP al que se conecta Notification
      - "1025:1025"

    environment:
      MP_MAX_MESSAGES: "5000"
      MP_DATABASE: /data/mailpit.db

    volumes:
      - mailpit-data:/data

    networks:
      - appliance-network


# =========================================================
# VOLÚMENES PERSISTENTES
# =========================================================
volumes:
  mysql-data:
  kafka-data:
  mailpit-data:


# =========================================================
# RED INTERNA DE DOCKER
# =========================================================
networks:
  appliance-network:
    name: appliance-network